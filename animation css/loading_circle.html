<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دائرة الانتظار</title>
  <style>
    .loader {
      border: 8px double #f3f3f3; /* لون الخلفية */
      border-top: 8px solid #3498db; /* لون الجزء المتحرك */
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s;
      margin: 50px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="loader"></div>

</body>
</html>
