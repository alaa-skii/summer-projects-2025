<html>
    <head>
        <style>
#load{
    border: 10px solid rgb(5, 5, 5);
    
    margin:200px auto;
    height:400px;
    width:400px;
   animation:spin 2s infinite linear;

}
@keyframes spin{
    0%{
background: red;
transform: rotate(0deg);
border: 10px  rgb(47, 170, 10) double;
    }
    50%{
        background: green;
        transform: rotate(180deg);
    }
    100%{
background: blue;
transform: rotate(360deg);
    }
}

        </style>
    </head>
    <body>
<div id="load"></div>
    </body>
</html>
